<!DOCTYPE html>
<html  window-frame="transparent" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo</title>
    <link href="css/index.css" rel="stylesheet">

</head>
<body role=window-caption>
<div class="main">

    <div class="container">

        <h1>欢迎使用 Feng 待办事项</h1>

        <div class="input-add">
            <input type="text">
            <button><i class="plus"></i></button>
        </div>

        <div class="filters">
            <span class="filter active">全部</span>
            <span class="filter">已完成</span>
            <span class="filter">未完成</span>
        </div>
        <div class="todo-list">
            <div class="todo-item done">
                <label >

                    <input type="checkbox" checked>
                    todo 1
                    <span class="check-button"></span>
                </label>
            </div>
            <div class="todo-item">
                <label>

                    <input type="checkbox">
                    todo 2
                    <span class="check-button"></span>
                </label>
            </div>
            <div class="todo-item">
                <label >

                    <input type="checkbox">
                    todo 3
                    <span class="check-button"></span>
                </label>
            </div>
        </div>
    </div>

</div>
<script src="tis/todo-list.tis">

</script>
</body>
</html>
